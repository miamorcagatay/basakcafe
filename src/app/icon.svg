<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#f0fdf4"/>
  <!-- Stalk -->
  <line x1="16" y1="29" x2="16" y2="8" stroke="#15803d" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Main grain head -->
  <ellipse cx="16" cy="6" rx="2.4" ry="4" fill="#15803d"/>
  <!-- Left grains -->
  <ellipse cx="12.5" cy="11.5" rx="1.9" ry="3.2" fill="#16a34a" transform="rotate(-25 12.5 11.5)"/>
  <ellipse cx="11.5" cy="17.5" rx="1.7" ry="3" fill="#16a34a" transform="rotate(-20 11.5 17.5)"/>
  <ellipse cx="12" cy="23" rx="1.4" ry="2.4" fill="#22c55e" transform="rotate(-15 12 23)"/>
  <!-- Right grains -->
  <ellipse cx="19.5" cy="11.5" rx="1.9" ry="3.2" fill="#16a34a" transform="rotate(25 19.5 11.5)"/>
  <ellipse cx="20.5" cy="17.5" rx="1.7" ry="3" fill="#16a34a" transform="rotate(20 20.5 17.5)"/>
  <ellipse cx="20" cy="23" rx="1.4" ry="2.4" fill="#22c55e" transform="rotate(15 20 23)"/>
  <!-- Awns -->
  <line x1="16" y1="3.5" x2="16" y2="1.2" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12.8" y1="8" x2="9.8" y2="5.5" stroke="#15803d" stroke-width="1" stroke-linecap="round"/>
  <line x1="19.2" y1="8" x2="22.2" y2="5.5" stroke="#15803d" stroke-width="1" stroke-linecap="round"/>
</svg>
